<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBits - Consultation Notes</title>
  <link rel="stylesheet" href="../../css/doctor/shared.css" />
  <link rel="stylesheet" href="../../css/doctor/consultation.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h3 id="dp-name">Patient Note</h3>
    <button class="close-btn" onclick="closeDetail()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <label>Patient</label>
      <div class="value" id="dp-patient">--</div>
    </div>
    <div class="detail-section">
      <label>Date</label>
      <div class="value" id="dp-date">--</div>
    </div>
    <div class="detail-section">
      <label>Consultation Notes</label>
      <div class="value" id="dp-notes">--</div>
    </div>
    <div class="detail-section">
      <label>Prescription</label>
      <div class="value" id="dp-prescription">--</div>
    </div>
    <div class="detail-section">
      <label>Lab Tests</label>
      <div id="dp-labs" class="tag-list"></div>
    </div>
    <div class="detail-section">
      <label>Follow-Up</label>
      <div class="value" id="dp-followup">--</div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Create Note</h3>
      <button class="close-btn" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Patient</label>
        <input class="form-input" placeholder="Search patient..." id="cn-patient" />
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="cn-date" />
      </div>
      <div class="form-group">
        <label class="form-label">Consultation Notes</label>
        <textarea class="form-textarea" placeholder="Type the consultation log..." id="cn-notes"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Prescription</label>
        <textarea class="form-textarea" placeholder="Add prescription details and frequency..." id="cn-prescription"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Lab Test</label>
        <input class="form-input" placeholder="Add test..." id="cn-lab" />
      </div>
      <div class="form-group">
        <label class="form-label">Follow-Up</label>
        <input class="form-input" type="date" id="cn-followup" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<div class="main">
  <header class="topbar" id="doctor-topbar"></header>

  <div class="content">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div class="search-bar" style="flex:1;margin-right:16px;margin-bottom:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--gray-400)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input placeholder="Search appointment..." />
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Create Note</button>
      </div>

      <div class="section-header">
        <h2>Patient Consultation Records</h2>
        <a href="#" class="view-all">View All</a>
      </div>

      <div id="recordsList"></div>
    </div>
  </div>
</div>

<script src="../../js/doctor/shared.js"></script>
<script src="../../js/doctor/consultation.js"></script>
</body>
</html>
