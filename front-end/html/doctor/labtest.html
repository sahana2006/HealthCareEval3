<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBits – Lab Test</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

    .test-catalog {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .test-card {
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .test-card:hover { border-color: var(--accent); }
    .test-card.selected { border-color: var(--accent); background: var(--green-50); }
    .test-card.selected::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
    }
    .test-card .t-name { font-size: 13px; font-weight: 700; color: var(--gray-900); }
    .test-card .t-cat { font-size: 11px; color: var(--gray-400); margin-top: 3px; }

    .patient-select {
      margin-bottom: 20px;
    }

    .pkg-panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .pkg-header {
      background: var(--green-50);
      border-bottom: 1px solid var(--green-100);
      padding: 16px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .pkg-header h3 { font-size: 14px; font-weight: 700; color: var(--green-800); }

    .pkg-body { padding: 18px; }

    .selected-test-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
    }
    .selected-test-item:last-child { border-bottom: none; }
    .selected-test-item .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--gray-300); font-size: 16px; line-height: 1;
      transition: color 0.12s;
    }
    .selected-test-item .remove-btn:hover { color: #dc2626; }

    .test-count {
      background: var(--accent);
      color: white;
      border-radius: 999px;
      width: 20px; height: 20px;
      font-size: 11px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .empty-pkg {
      text-align: center;
      padding: 32px 20px;
      color: var(--gray-300);
    }
    .empty-pkg svg { margin-bottom: 10px; }
    .empty-pkg p { font-size: 13px; }
  </style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">
      <h1>Lab Test Package Creation</h1>
      <p>Doctor Portal</p>
    </div>
    <div class="topbar-right">
      <button class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div class="doctor-info">
        <div class="avatar">SJ</div>
        <div>
          <div class="name">Dr. Sarah Johnson</div>
          <div class="role">Doctor</div>
        </div>
      </div>
    </div>
  </header>

  <div class="content">
    <!-- Patient selector -->
    <div class="card patient-select">
      <label class="form-label">Select Patient</label>
      <select class="form-select">
        <option>PAT-001 Alpha Verma</option>
        <option>PAT-002 Dev Patel</option>
        <option>PAT-003 Nia Sharma</option>
      </select>
    </div>

    <div class="page-grid">
      <!-- Left: Test Catalog -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <h2 style="font-size:15px;font-weight:700;">Search Individual Tests</h2>
          <div style="position:relative;">
            <input class="form-input" placeholder="Search tests..." style="padding-left:34px;width:220px;" oninput="filterTests(this.value)" />
            <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
        </div>

        <div class="test-catalog" id="testCatalog"></div>
      </div>

      <!-- Right: Package Panel -->
      <div>
        <div class="pkg-panel">
          <div class="pkg-header">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <h3>Test Package</h3>
              <span class="test-count" id="testCount">0</span>
            </div>
          </div>
          <div class="pkg-body">
            <div class="form-group">
              <label class="form-label">Package Name</label>
              <input class="form-input" placeholder="e.g., Cardiac Health Panel" id="pkgName" />
            </div>
            <div class="form-group">
              <label class="form-label">Package Theme</label>
              <input class="form-input" placeholder="e.g., Patient has high fever" id="pkgTheme" />
            </div>

            <label class="form-label" style="margin-bottom:8px;">Selected Tests</label>
            <div id="selectedTests">
              <div class="empty-pkg">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18"/></svg>
                <p>No tests selected.<br>Click tests on the left to add.</p>
              </div>
            </div>

            <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--gray-100);">
              <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--gray-500);margin-bottom:4px;">
                <span>Selected Tests</span>
                <span id="countLabel">0</span>
              </div>
            </div>

            <button class="btn btn-primary" style="width:100%;margin-top:14px;" onclick="assignPackage()">
              + Assign To Patient
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
renderSidebar('labtest');

const ALL_TESTS = [
  { id:'cbc',    name:'Complete Blood Count',  cat:'Hematology' },
  { id:'lipid',  name:'Lipid Profile',          cat:'Biochemistry' },
  { id:'liver',  name:'Liver Function Test',    cat:'Biochemistry' },
  { id:'thyroid',name:'Thyroid Function Test',  cat:'Endocrinology' },
  { id:'hba1c',  name:'HbA1c',                  cat:'Diabetes' },
  { id:'vitd',   name:'Vitamin D',              cat:'Vitamins' },
  { id:'rft',    name:'Renal Function Test',    cat:'Nephrology' },
  { id:'ecg',    name:'ECG',                    cat:'Cardiology' },
];

let selected = [];
let filtered = [...ALL_TESTS];

function filterTests(val) {
  filtered = ALL_TESTS.filter(t => t.name.toLowerCase().includes(val.toLowerCase()) || t.cat.toLowerCase().includes(val.toLowerCase()));
  renderCatalog();
}

function renderCatalog() {
  document.getElementById('testCatalog').innerHTML = filtered.map(t => `
    <div class="test-card ${selected.includes(t.id) ? 'selected' : ''}" onclick="toggleTest('${t.id}')">
      <div class="t-name">${t.name}</div>
      <div class="t-cat">${t.cat}</div>
    </div>
  `).join('');
}

function toggleTest(id) {
  if (selected.includes(id)) {
    selected = selected.filter(s => s !== id);
  } else {
    selected.push(id);
  }
  renderCatalog();
  renderSelected();
}

function renderSelected() {
  document.getElementById('testCount').textContent = selected.length;
  document.getElementById('countLabel').textContent = selected.length;

  if (selected.length === 0) {
    document.getElementById('selectedTests').innerHTML = `
      <div class="empty-pkg">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18"/></svg>
        <p>No tests selected.<br>Click tests on the left to add.</p>
      </div>`;
    return;
  }

  document.getElementById('selectedTests').innerHTML = selected.map(id => {
    const t = ALL_TESTS.find(x => x.id === id);
    return `<div class="selected-test-item">
      <span>${t.name}</span>
      <button class="remove-btn" onclick="toggleTest('${id}')">×</button>
    </div>`;
  }).join('');
}

function assignPackage() {
  const name = document.getElementById('pkgName').value;
  if (!name) { alert('Please enter a package name.'); return; }
  if (selected.length === 0) { alert('Please select at least one test.'); return; }
  alert(`Package "${name}" with ${selected.length} tests assigned to patient!`);
}

renderCatalog();
renderSelected();
</script>
</body>
</html>
