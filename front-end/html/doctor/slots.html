<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBits – Slot Management</title>
  <link rel="stylesheet" href="../../css/pages/doctor/shared.css" />
  <style>
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .slot-btn {
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      background: var(--white);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .slot-btn .time { font-size: 13px; font-weight: 600; color: var(--gray-900); }
    .slot-btn .status { font-size: 10.5px; margin-top: 3px; }
    .slot-btn.available { border-color: var(--green-300); background: var(--green-50); }
    .slot-btn.available .status { color: var(--green-600); }
    .slot-btn.booked { border-color: var(--gray-200); background: var(--gray-100); cursor: not-allowed; }
    .slot-btn.booked .time { color: var(--gray-400); }
    .slot-btn.booked .status { color: var(--gray-400); }
    .slot-btn.selected { border-color: var(--accent); background: var(--accent); }
    .slot-btn.selected .time { color: white; }
    .slot-btn.selected .status { color: rgba(255,255,255,0.8); }

    .slot-btn:not(.booked):hover { border-color: var(--accent); }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-col { text-align: center; }
    .day-name { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; margin-bottom: 6px; }
    .day-dot {
      width: 10px; height: 10px; border-radius: 50%;
      margin: 0 auto 4px;
    }
    .day-count { font-size: 11.5px; color: var(--gray-500); font-weight: 500; }
    .day-col.today .day-name { color: var(--accent); }

    .unavail-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .unavail-item:last-child { border-bottom: none; }
    .unavail-item .date-text { font-size: 13px; font-weight: 600; color: var(--gray-900); }
    .unavail-item .reason { font-size: 11.5px; color: var(--gray-400); margin-top: 2px; }
  </style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">
      <h1>Slot Management</h1>
      <p>Doctor Portal</p>
    </div>
    <div class="topbar-right">
      <button class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div class="doctor-info">
        <div class="avatar">SJ</div>
        <div>
          <div class="name">Dr. Sarah Johnson</div>
          <div class="role">Doctor</div>
        </div>
      </div>
    </div>
  </header>

  <div class="content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
      <!-- Select Date -->
      <div class="card">
        <div class="section-header" style="margin-bottom:14px;">
          <h2>Select Date</h2>
        </div>
        <input class="form-input" type="date" id="slotDate" onchange="renderSlots()" />
      </div>

      <!-- Mark Unavailable -->
      <div class="card">
        <div class="section-header" style="margin-bottom:14px;">
          <h2>Mark Unavailable Date</h2>
        </div>
        <div style="display:flex;gap:10px;">
          <input class="form-input" type="date" id="unavailDate" style="flex:1;" />
          <button class="btn btn-primary btn-sm" onclick="markUnavail()">Mark Unavailable</button>
        </div>
      </div>
    </div>

    <!-- Slot Grid -->
    <div class="card" style="margin-bottom:20px;">
      <div class="section-header">
        <h2 id="slotsTitle">Manage Slots for — </h2>
        <a href="#" class="view-all">View All</a>
      </div>

      <div class="slot-grid" id="slotsGrid"></div>

      <div style="display:flex;gap:12px;align-items:center;font-size:12px;color:var(--gray-500);">
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--green-100);border:1px solid var(--green-300);display:inline-block;"></span> Available</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--accent);display:inline-block;"></span> Selected</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--gray-200);display:inline-block;"></span> Booked</span>
      </div>
    </div>

    <!-- Weekly Overview -->
    <div class="card">
      <div class="section-header">
        <h2>Weekly Availability Overview</h2>
      </div>
      <div class="week-grid" id="weekGrid"></div>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
renderSidebar('slots');

const TIMES = ['09:00 AM','10:00 AM','11:00 AM','12:00 PM','01:00 PM','02:00 PM','03:00 PM','04:00 PM'];
const BOOKED = ['10:00 AM','01:00 PM'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const AVAIL_COUNTS = [6,5,7,4,6,2,0];

let selectedSlots = [];

// Default date to today
const today = new Date().toISOString().split('T')[0];
document.getElementById('slotDate').value = today;

function renderSlots() {
  const date = document.getElementById('slotDate').value;
  if (!date) return;
  const formatted = new Date(date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('slotsTitle').textContent = `Manage Slots for ${formatted}`;

  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = TIMES.map(t => {
    const isBooked = BOOKED.includes(t);
    const isSelected = selectedSlots.includes(t);
    let cls = isBooked ? 'booked' : isSelected ? 'selected' : 'available';
    const statusText = isBooked ? 'Booked' : isSelected ? 'Selected' : 'Available';
    return `<button class="slot-btn ${cls}" onclick="toggleSlot('${t}',this)" ${isBooked ? 'disabled' : ''}>
      <div class="time">${t}</div>
      <div class="status">${statusText}</div>
    </button>`;
  }).join('');
}

function toggleSlot(time, el) {
  if (selectedSlots.includes(time)) {
    selectedSlots = selectedSlots.filter(t => t !== time);
    el.classList.remove('selected');
    el.classList.add('available');
    el.querySelector('.status').textContent = 'Available';
  } else {
    selectedSlots.push(time);
    el.classList.remove('available');
    el.classList.add('selected');
    el.querySelector('.status').textContent = 'Selected';
  }
}

function markUnavail() {
  const d = document.getElementById('unavailDate').value;
  if (!d) return;
  alert(`Date ${d} marked as unavailable.`);
  document.getElementById('unavailDate').value = '';
}

function renderWeek() {
  const colors = ['#3a9657','#2d7a47','#4db870','#f59e0b','#3a9657','#e5e7eb','#f3f4f6'];
  document.getElementById('weekGrid').innerHTML = DAYS.map((d,i) => `
    <div class="day-col ${i===2?'today':''}">
      <div class="day-name">${d}</div>
      <div class="day-dot" style="background:${colors[i]}"></div>
      <div class="day-count">${AVAIL_COUNTS[i]} slots</div>
    </div>
  `).join('');
}

renderSlots();
renderWeek();
</script>
</body>
</html>
